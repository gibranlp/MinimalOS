# MinimalOS – Picom Compositor Configuration
# Lightweight settings tuned for gaming (no heavy animations).
# ─────────────────────────────────────────────────────────────────────────────

# ── Backend ───────────────────────────────────────────────────────────────
backend = "glx";
glx-no-stencil = true;
glx-no-rebind-pixmap = true;

# ── Shadows ───────────────────────────────────────────────────────────────
shadow = true;
shadow-radius = 12;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.6;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "_GTK_FRAME_EXTENTS@:c",
    "window_type = 'dock'",
    "window_type = 'tooltip'",
    "fullscreen"
];

# ── Fading ────────────────────────────────────────────────────────────────
fading = true;
fade-in-step  = 0.04;
fade-out-step = 0.04;
fade-delta    = 6;
no-fading-openclose = false;

# ── Transparency ──────────────────────────────────────────────────────────
inactive-opacity = 0.95;
active-opacity   = 1.0;
frame-opacity    = 1.0;
inactive-opacity-override = false;

opacity-rule = [
    "100:class_g = 'Steam'",
    "100:class_g = 'Lutris'",
    "100:fullscreen",
    "95:class_g = 'Alacritty'",
    "100:class_g = 'Brave-browser'",
    "100:class_g = 'Google-chrome'",
];

# ── Blur ──────────────────────────────────────────────────────────────────
blur-method = "dual_kawase";
blur-strength = 5;
blur-background = true;
blur-background-frame = false;
blur-background-fixed = false;
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'tooltip'",
    "class_g = 'Steam'",
    "fullscreen"
];

# ── Corners ───────────────────────────────────────────────────────────────
corner-radius = 8;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'tooltip'",
    "fullscreen"
];

# ── General ───────────────────────────────────────────────────────────────
mark-wmwin-focused   = true;
mark-ovredir-focused = true;
use-ewmh-active-win  = false;
detect-rounded-corners = true;
detect-client-opacity  = true;
detect-transient       = true;
detect-client-leader   = true;
use-damage             = false;   # true breaks Alacritty (GLX damage not reported)
log-level              = "warn";

# Disable vsync when gaming (toggle manually if needed)
vsync = true;
