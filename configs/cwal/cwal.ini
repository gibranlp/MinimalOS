# cwal configuration for MinimalOS
# ─────────────────────────────────────────────────────────────────────────────
# Templates → app config links. Format:
#   template_name = destination_path | reload_command
# Built-in template names: colors-alacritty.toml, colors-dunst,
#   colors-rofi-dark.rasi, colors-rofi-light.rasi, colors.sh, colors.json
# ─────────────────────────────────────────────────────────────────────────────

[general]
out_dir         = ~/.cache/cwal/
backend         = cwal
script_path     = ~/.local/bin/SOS_Cwal_Post.sh

[options]
alpha           = 0.90
saturation      = 0.00
contrast        = 1.00
mode            = dark
cols16_mode     = darken

[random]
random_dir      = ~/Pictures/Wallpapers

[links]
# Terminal
colors-alacritty.toml = ~/.config/alacritty/colors.toml

# Notifications
colors-dunst = ~/.config/dunst/dunstrc | pkill -HUP dunst || dunst &

# Launcher
colors-rofi-dark.rasi = ~/.config/rofi/colors.rasi
