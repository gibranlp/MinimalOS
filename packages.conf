# MinimalOS Package List
# ─────────────────────────────────────────────────────────────────────────────
# Sections: [pacman] and [aur]
# One package per line. Lines starting with # are comments.
# Inline comments after a package name are stripped before install.
#
# To apply changes after editing this file:
#   ./install.sh --sync-packages
# ─────────────────────────────────────────────────────────────────────────────

